<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
	<title>Balkoni</title>
	<!-- Hintergrund (weiß, abgerundet) -->
	<rect x="1.5" y="1.5" width="29" height="29" rx="3.5" fill="#ffffff"/>

	<!-- Clip-Pfad: Balkon-Polygon mit großer Schräge oben rechts -->
	<defs>
		<clipPath id="polyClip">
			<polygon points="5,5 15,5 27,17 27,27 5,27"/>
		</clipPath>
	</defs>

	<!-- Holzdielen, auf das Polygon zugeschnitten -->
	<g clip-path="url(#polyClip)">
		<rect x="0" y="5"  width="32" height="3.6" fill="#c08552"/>
		<rect x="0" y="9"  width="32" height="3.6" fill="#a06a3f"/>
		<rect x="0" y="13" width="32" height="3.6" fill="#c08552"/>
		<rect x="0" y="17" width="32" height="3.6" fill="#a06a3f"/>
		<rect x="0" y="21" width="32" height="3.6" fill="#c08552"/>
		<rect x="0" y="25" width="32" height="3.6" fill="#a06a3f"/>
	</g>

	<!-- Polygon-Umriss -->
	<polygon points="5,5 15,5 27,17 27,27 5,27"
		fill="none" stroke="#1f2937" stroke-width="1.4" stroke-linejoin="round"/>
</svg>
